    <meta charset="UTF-8" />

    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <link rel="icon" href="/favicon.ico">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f0f9ff; /* sky-50 */
      }
      /* Hide scrollbar for clean UI in lists */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Custom Animations */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(5px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fadeIn 0.3s ease-out forwards;
      }

      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-10px); height: 0; }
        to { opacity: 1; transform: translateY(0); height: auto; }
      }
      .animate-slide-down {
        animation: slideDown 0.3s ease-out forwards;
      }
      
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.5s ease-out forwards;
      }

      @keyframes scaleIn {
        from { transform: scale(0); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      .animate-scale-in {
        animation: scaleIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }

      /* Spring Animations to mimic Framer Motion */
      @keyframes springUp {
        0% { opacity: 0; transform: translateY(30px) scale(0.98); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }
      .animate-spring-up {
        animation: springUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      @keyframes smoothUp {
        0% { opacity: 0; transform: translateY(20px) scale(0.95); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }
      .animate-smooth-up {
        animation: smoothUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      @keyframes springScale {
        0% { opacity: 0; transform: scale(0.85); }
        100% { opacity: 1; transform: scale(1); }
      }
      .animate-spring-scale {
        animation: springScale 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      
      @keyframes springSlideLeft {
        0% { opacity: 0; transform: translateX(30px); }
        100% { opacity: 1; transform: translateX(0); }
      }
      .animate-spring-slide-left {
        animation: springSlideLeft 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      
      @keyframes springSlideRight {
        0% { opacity: 0; transform: translateX(-30px); }
        100% { opacity: 1; transform: translateX(0); }
      }
      .animate-spring-slide-right {
        animation: springSlideRight 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      @keyframes fadeOut {
        from { opacity: 1; transform: scale(1); }
        to { opacity: 0; transform: scale(0.95); }
      }
      .animate-fade-out {
        animation: fadeOut 0.2s ease-in forwards;
      }
      .ease-spring {
        transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);
      }
    </style>
